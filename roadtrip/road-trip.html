<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>First Family Road Trip 🦞</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5f0e8;
    --ocean: #2a6b7c;
    --seafoam: #4a9b8e;
    --coral: #e07b5a;
    --dusk: #5c4a6e;
    --amber: #d4a843;
    --slate: #3a4a5c;
    --mist: #e8eef2;
    --text: #1e2a35;
    --soft: #7a8a9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--slate);
    color: white;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .header .subtitle {
    font-size: 0.7rem;
    opacity: 0.6;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .compass { font-size: 1.4rem; }
  .home-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .home-btn:hover { background: rgba(255,255,255,0.25); }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    overflow-x: auto;
    background: white;
    border-bottom: 1px solid #e0e8ec;
    scrollbar-width: none;
    position: sticky;
    top: 62px;
    z-index: 99;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #d0dce4;
    background: transparent;
    font-size: 0.72rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--soft);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-tab.active {
    background: var(--slate);
    color: white;
    border-color: var(--slate);
  }

  /* CONTENT */
  .content { padding: 0 0 80px; }

  /* DAY PANEL */
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  /* DAY HERO */
  .day-hero {
    padding: 20px 20px 16px;
    background: white;
    border-bottom: 1px solid #e8eef2;
  }
  .day-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
  }
  .day-subtitle {
    font-size: 0.75rem;
    color: var(--soft);
    margin-top: 4px;
    font-style: italic;
  }

  /* STOPS LIST */
  .stops { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

  .stop-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s;
  }
  .stop-card:active { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }

  .stop-inner {
    display: flex;
    align-items: stretch;
    min-height: 68px;
  }

  .stop-accent {
    width: 5px;
    flex-shrink: 0;
  }

  .stop-icon-wrap {
    width: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    opacity: 0.85;
  }

  .stop-body {
    flex: 1;
    padding: 12px 12px 12px 4px;
    min-width: 0;
  }

  .stop-time {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--soft);
    font-weight: 500;
    margin-bottom: 2px;
  }

  .stop-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.2;
  }

  .stop-desc {
    font-size: 0.75rem;
    color: var(--soft);
    margin-top: 3px;
    line-height: 1.4;
  }

  .stop-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    padding: 8px 12px 8px 4px;
    gap: 5px;
    flex-shrink: 0;
  }

  .waze-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--seafoam);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.65rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.03em;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .waze-btn:hover { background: var(--ocean); }
  .waze-btn.driving {
    background: var(--coral);
  }
  .waze-btn.driving:hover { background: #c56040; }

  /* TODDLER CUE */
  .toddler-cue {
    margin: 0 16px 0;
    background: linear-gradient(135deg, #fff9f0, #fff4e8);
    border-left: 3px solid var(--amber);
    border-radius: 0 10px 10px 0;
    padding: 8px 12px;
    font-size: 0.72rem;
    color: #8a6020;
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* SECTION DIVIDER */
  .section-label {
    padding: 16px 16px 6px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--soft);
    font-weight: 600;
  }

  /* COLOR ACCENTS by type */
  .c-drive { background: #2a6b7c; }
  .c-nature { background: #4a9b8e; }
  .c-food { background: #e07b5a; }
  .c-hotel { background: #5c4a6e; }
  .c-activity { background: #d4a843; }
  .c-scenic { background: #7a9e7a; }
  .c-rest { background: #a0aab4; }
  .c-date { background: #8a6090; }

  /* OVERVIEW MAP BTN */
  .overview-strip {
    margin: 0 16px 4px;
    background: var(--ocean);
    color: white;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    width: calc(100% - 32px);
    font-family: 'DM Sans', sans-serif;
  }
  .overview-strip-text { font-size: 0.8rem; font-weight: 600; }
  .overview-strip-sub { font-size: 0.65rem; opacity: 0.75; margin-top: 1px; }
  .overview-strip-icon { font-size: 1.3rem; }

  /* PROGRESS BAR */
  .trip-progress {
    padding: 10px 16px 0;
  }
  .progress-track {
    height: 3px;
    background: #d8e4ea;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--seafoam), var(--ocean));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.62rem;
    color: var(--soft);
    margin-top: 4px;
    text-align: right;
  }

  /* NOTES CARD */
  .notes-card {
    margin: 0 16px;
    background: linear-gradient(135deg, #f0f6f8, #e8f2f5);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid #d0e4ea;
  }
  .notes-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ocean);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .notes-items { display: flex; flex-direction: column; gap: 4px; }
  .notes-item {
    font-size: 0.73rem;
    color: var(--slate);
    display: flex;
    gap: 6px;
    line-height: 1.4;
  }
  .notes-item::before { content: '·'; color: var(--seafoam); flex-shrink: 0; }
</style>
</head>

        <div class="progress-track"><div class="progress-fill" style="width:${day.progress}%"></div></div>
        <div class="progress-label">Trip progress: ${day.progress}%</div>
      </div>
      <div class="stops">
    `;

    // Overview Waze strip for driving days
    if (day.stops[0] && (day.stops[0].type === 'drive')) {
      const dest = day.stops.find(s => s.type === 'hotel');
      if (dest) {
        html += `
          <a href="${makeWazeUrl(dest.waze)}" target="_blank" class="overview-strip">
            <div>
              <div class="overview-strip-text">📍 Navigate to ${dest.name.split('—')[0].trim()}</div>
              <div class="overview-strip-sub">Open full day's destination in Waze</div>
            </div>
            <div class="overview-strip-icon">🔵</div>
          </a>
        `;
      }
    }

    if (day.notes) {
      html += `<div class="notes-card"><div class="notes-title">📋 Road Notes</div><div class="notes-items">`;
      day.notes.forEach(n => { html += `<div class="notes-item">${n}</div>`; });
      html += `</div></div>`;
    }

    day.stops.forEach(stop => {
      const colorClass = typeColors[stop.type] || 'c-activity';
      html += `
        <div class="stop-card">
          <div class="stop-inner">
            <div class="stop-accent ${colorClass}"></div>
            <div class="stop-icon-wrap">${stop.icon}</div>
            <div class="stop-body">
              <div class="stop-time">${stop.time}</div>
              <div class="stop-name">${stop.name}</div>
              <div class="stop-desc">${stop.desc}</div>
            </div>
            <div class="stop-actions">
              ${stop.waze ? `<a href="${makeWazeUrl(stop.waze)}" target="_blank" class="waze-btn ${stop.type === 'drive' ? 'driving' : ''}">🔵 Waze</a>` : ''}
            </div>
          </div>
          ${stop.cue ? `<div class="toddler-cue">🧒 "${stop.cue}" · ${stop.cueDuration || ''}</div>` : ''}
        </div>
      `;
    });

    html += `</div>`;
    panel.innerHTML = html;
    contentEl.appendChild(panel);
  });
}

function switchDay(index) {
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });
  document.querySelectorAll('.day-panel').forEach((p, i) => {
    p.classList.toggle('active', i === index);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderTabs();
renderContent();
</script>
</body>
</html>
